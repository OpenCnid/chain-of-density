<svg viewBox="0 0 880 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="chain-of-density: five same-sized boxes, T1 sparse through T5 dense, each holding more dots than the last">
  <defs>
    <linearGradient id="ramp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#9b8cf7"/>
      <stop offset="100%" stop-color="#ef6fd0"/>
    </linearGradient>
  </defs>

  <text x="440" y="50" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="34" font-weight="700" fill="url(#ramp)">chain-of-density</text>
  <text x="440" y="82" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="12.5" fill="#8b949e">same length &#183; more inside &#183; every fact cites its way home</text>

  <!-- five fixed-size boxes: the length never grows, the contents do -->
  <g fill="#8b949e" fill-opacity="0.06" stroke="#8b949e" stroke-opacity="0.45">
    <rect x="80"  y="110" width="120" height="84" rx="10"/>
    <rect x="230" y="110" width="120" height="84" rx="10"/>
    <rect x="380" y="110" width="120" height="84" rx="10"/>
    <rect x="530" y="110" width="120" height="84" rx="10"/>
    <rect x="680" y="110" width="120" height="84" rx="10"/>
  </g>

  <g font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="15" fill="#8b949e">
    <text x="215" y="157" text-anchor="middle">&#8594;</text>
    <text x="365" y="157" text-anchor="middle">&#8594;</text>
    <text x="515" y="157" text-anchor="middle">&#8594;</text>
    <text x="665" y="157" text-anchor="middle">&#8594;</text>
  </g>

  <!-- T1: 3 entities -->
  <g transform="translate(80,110)" fill="#58a6ff" opacity="1">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0s" fill="freeze"/>
    <circle cx="35" cy="45" r="4"/><circle cx="65" cy="58" r="4"/><circle cx="88" cy="38" r="4"/>
  </g>
  <!-- T2: 6 -->
  <g transform="translate(230,110)" fill="#799bfa" opacity="1">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.4;1" dur="1.0s" begin="0s" fill="freeze"/>
    <circle cx="28" cy="40" r="4"/><circle cx="52" cy="55" r="4"/><circle cx="75" cy="38" r="4"/>
    <circle cx="95" cy="58" r="4"/><circle cx="40" cy="66" r="4"/><circle cx="85" cy="68" r="4"/>
  </g>
  <!-- T3: 9 -->
  <g transform="translate(380,110)" fill="#9b8cf7" opacity="1">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.57;1" dur="1.4s" begin="0s" fill="freeze"/>
    <circle cx="24" cy="38" r="4"/><circle cx="45" cy="50" r="4"/><circle cx="66" cy="36" r="4"/>
    <circle cx="88" cy="48" r="4"/><circle cx="30" cy="62" r="4"/><circle cx="55" cy="68" r="4"/>
    <circle cx="78" cy="62" r="4"/><circle cx="98" cy="38" r="4"/><circle cx="96" cy="68" r="4"/>
  </g>
  <!-- T4: 12 -->
  <g transform="translate(530,110)" fill="#c47bf3" opacity="1">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.67;1" dur="1.8s" begin="0s" fill="freeze"/>
    <circle cx="22" cy="36" r="4"/><circle cx="40" cy="46" r="4"/><circle cx="58" cy="36" r="4"/>
    <circle cx="76" cy="46" r="4"/><circle cx="94" cy="36" r="4"/><circle cx="30" cy="58" r="4"/>
    <circle cx="48" cy="66" r="4"/><circle cx="66" cy="56" r="4"/><circle cx="84" cy="66" r="4"/>
    <circle cx="100" cy="56" r="4"/><circle cx="24" cy="70" r="4"/><circle cx="58" cy="70" r="4"/>
  </g>
  <!-- T5: 16 -->
  <g transform="translate(680,110)" fill="#ef6fd0" opacity="1">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.73;1" dur="2.2s" begin="0s" fill="freeze"/>
    <circle cx="20" cy="34" r="4"/><circle cx="38" cy="40" r="4"/><circle cx="56" cy="34" r="4"/>
    <circle cx="74" cy="40" r="4"/><circle cx="92" cy="34" r="4"/><circle cx="104" cy="44" r="4"/>
    <circle cx="26" cy="48" r="4"/><circle cx="44" cy="54" r="4"/><circle cx="62" cy="48" r="4"/>
    <circle cx="80" cy="54" r="4"/><circle cx="96" cy="60" r="4"/><circle cx="22" cy="62" r="4"/>
    <circle cx="40" cy="68" r="4"/><circle cx="58" cy="62" r="4"/><circle cx="76" cy="68" r="4"/>
    <circle cx="94" cy="70" r="4"/>
  </g>

  <g font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="12" fill="#8b949e">
    <text x="140" y="216" text-anchor="middle">T1 &#183; sparse</text>
    <text x="290" y="216" text-anchor="middle">T2</text>
    <text x="440" y="216" text-anchor="middle">T3</text>
    <text x="590" y="216" text-anchor="middle">T4</text>
    <text x="740" y="216" text-anchor="middle">T5 &#183; dense</text>
  </g>
</svg>
